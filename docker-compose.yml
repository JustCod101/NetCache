services:
  master-1:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >-
      bash -lc "mvn -q -pl netcache-server -am exec:java
      -Dexec.mainClass=com.netcache.server.NetCacheServer
      -Dnetcache.host=0.0.0.0
      -Dnetcache.port=7001"
    ports:
      - "7001:7001"

  master-2:
    image: maven:3.9.9-eclipse-temurin-21
